<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: #1f3d8f;
            text-align: center;
        }

        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            background: #1f3d8f;
            color: white;
            border: none;
            cursor: pointer;
        }

        li {
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            list-style: none;
            display: flex;
            justify-content: space-between;
        }

        .delete-btn {
            background: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Academic Planner</h1>

    <input type="text" id="taskInput" placeholder="Enter assignment or task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {

    let taskInput = document.getElementById("taskInput");
    let taskText = taskInput.value;

    if(taskText === ""){
        alert("Please enter a task.");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
        ${taskText}
        <button class="delete-btn" onclick="this.parentElement.remove()">
            Delete
        </button>
    `;

    document.getElementById("taskList").appendChild(li);

    taskInput.value = "";
}
</script>

</body>
</html><input type="text" id="taskInput" placeholder="Enter task">

<input type="date" id="dueDate">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>
